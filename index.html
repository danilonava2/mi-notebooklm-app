<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi NotebookLM - Dolor</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <!-- PDF.js + Mermaid -->
  <script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
  <style>
    .viewer { height: calc(100vh - 180px); }
    .modal { animation: modalPop 0.3s ease; }
    @keyframes modalPop { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
  </style>
</head>
<body class="bg-gray-950 text-gray-100">
  <div class="flex h-screen">
    <!-- Sidebar -->
    <div class="w-80 bg-gray-900 border-r border-gray-700 overflow-y-auto">
      <div class="p-5 border-b border-gray-700">
        <h1 class="text-2xl font-bold text-emerald-400 flex items-center gap-2">
          📚 Mi NotebookLM
        </h1>
        <p class="text-xs text-gray-500 mt-1">Máster en Dolor + IA</p>
      </div>
      <div id="chapters-list" class="p-3"></div>
    </div>

    <!-- Contenido principal -->
    <div class="flex-1 flex flex-col">
      <div class="p-4 border-b border-gray-700 bg-gray-900 flex justify-between items-center flex-wrap gap-3">
        <h2 id="current-title" class="text-xl font-semibold">Selecciona un tema</h2>
        <div id="action-buttons" class="hidden flex-wrap gap-2"></div>
      </div>
      
      <div id="viewer" class="viewer p-6 bg-gray-950 overflow-auto"></div>
    </div>
  </div>

  <!-- Modal IA -->
  <div id="ia-modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-50">
    <div class="modal bg-gray-900 rounded-3xl w-full max-w-4xl max-h-[90vh] overflow-hidden">
      <div class="p-6 border-b border-gray-700 flex items-center justify-between">
        <h3 class="text-2xl font-bold flex items-center gap-3">
          <i class="fas fa-brain text-purple-400"></i> Herramientas IA
        </h3>
        <button onclick="closeModal()" class="text-gray-400 hover:text-white text-3xl">×</button>
      </div>
      <div class="p-6" id="ia-content">
        <!-- Se llena con JavaScript -->
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
