<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi NotebookLM - Dolor</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    .viewer { height: calc(100vh - 180px); }
  </style>
</head>
<body class="bg-gray-950 text-gray-100">
  <div class="flex h-screen">
    <!-- Sidebar -->
    <div class="w-80 bg-gray-900 border-r border-gray-700 overflow-y-auto">
      <div class="p-5 border-b border-gray-700">
        <h1 class="text-2xl font-bold text-emerald-400 flex items-center gap-2">
          📚 Mi NotebookLM
        </h1>
        <p class="text-xs text-gray-500 mt-1">Máster en Dolor</p>
      </div>
      <div id="chapters-list" class="p-3"></div>
    </div>

    <!-- Contenido principal -->
    <div class="flex-1 flex flex-col">
      <div class="p-4 border-b border-gray-700 bg-gray-900 flex justify-between items-center">
        <h2 id="current-title" class="text-xl font-semibold">Selecciona un tema</h2>
        <div id="notebooklm-buttons" class="hidden flex-wrap gap-2"></div>
      </div>
      
      <div id="viewer" class="viewer p-6 bg-gray-950 overflow-auto">
        <p class="text-gray-400 text-center mt-32">← Selecciona un archivo del menú izquierdo</p>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
